<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Bill Splitter</title>
    <link rel="stylesheet" href="bill.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Bill Splitter</h1>
        <p>Quickly split a bill between friends and see what everyone pays.</p>
      </header>

      <section class="card">
        <div class="card__group">
          <label for="bill-amount">Bill amount</label>
          <div class="input-with-prefix">
            <span class="prefix">₹</span>
            <input
              type="number"
              id="bill-amount"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </div>

        <div class="card__group">
          <label for="people-count">Number of people</label>
          <input
            type="number"
            id="people-count"
            min="1"
            step="1"
            value="2"
          />
        </div>

        <div class="card__group">
          <label>Tip</label>
          <div class="tip-row">
            <button class="chip" data-tip="0">0%</button>
            <button class="chip" data-tip="5">5%</button>
            <button class="chip chip--active" data-tip="10">10%</button>
            <button class="chip" data-tip="15">15%</button>
            <div class="custom-tip">
              <input
                type="number"
                id="custom-tip"
                min="0"
                max="100"
                step="1"
                placeholder="Custom"
              />
              <span class="suffix">%</span>
            </div>
          </div>
        </div>

        <div class="card__results">
          <div class="result">
            <div class="result__label">
              <span>Per person</span>
              <small>Including tip</small>
            </div>
            <div class="result__value">
              <span class="currency">₹</span>
              <span id="per-person-total">0.00</span>
            </div>
          </div>

          <div class="result">
            <div class="result__label">
              <span>Total bill</span>
              <small>With tip</small>
            </div>
            <div class="result__value">
              <span class="currency">₹</span>
              <span id="total-with-tip">0.00</span>
            </div>
          </div>
        </div>

        <p class="card__note" id="summary-line">
          Enter an amount to see how it is split.
        </p>

        <button class="btn" id="reset-btn" type="button">Reset</button>
      </section>

      <footer class="app__footer">
        <p>Made with HTML, CSS &amp; vanilla JS.</p>
      </footer>
    </main>

    <script src="bill.js" defer></script>
  </body>
</html>
